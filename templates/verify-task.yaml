# プラグイン検証の実タスク定義（実行方法: このファイルをワークスペースの tasks/plugin-verify.yaml に
# コピーし「plugin-verify やって」— delve-start が A〜K の本物の経路で実行するため、
# ゲート・フェーズ判定・ログ記録そのものが検証の通り道で実地に効く）
# チャット貼り付けプロンプト（TESTING.md 末尾）と内容は同一。こちらが実運用に近い形式。

name: plugin-verify
description: プラグイン自己検証（/検証 full + 重点回帰）を実タスクとして実行する
domain: 基盤
place: plugin-verify        # knowledge/sites/plugin-verify/ に検証の足跡を残す

# 定常化する場合は cadence を「プラグイン更新後」等に。通常は手動実行
# schedule:
#   cadence: "手動"

steps:
  - action: interact
    description: |
      knowledge/config/browser.md を読み、優先ブラウザが記録されていればそれを選択する（未記録なら確認して記録する）。
  - action: interact
    description: |
      検証開始前に許可サイト限定を機械強制する:
      Bash で printf 'example\.com\nthe-internet\.herokuapp\.com\n' > memory/.workflow/verify_allowlist
      （url-guard がリスト外への遷移を deny。deny されたら該当項目を SKIP — 代替サイトを探さない）。
      その後 procedures/delve-verify.md を Read し、full モードの全項目（A/B/D/E 節）を実行する。
      原則: 読み取り専用・外部無害（実サイトへの送信・投稿・変更は一切しない。ブラウザ検証は example.com のみ —
      GitHub・marketplace リポジトリにもブラウザで行かない。bash/python 不可なら該当項目は SKIP と書くだけ）。
      FAIL には必ずエラー原文・観測事実を添え、1項目の失敗で止めず全項目を消化する。
  - action: verify
    checks:
      - "(1) V5 ref すり抜け回帰: https://the-internet.herokuapp.com/login（この URL 固定・自動化練習用テストサイト。実サービスのログインページには行かない）で find→ref 入力を試行し、入力前に read_page で type 確認→委譲する自己規律が働く（入力してしまったら FAIL。サイト不達なら SKIP — 代替を探し回らない）"
      - "(2) 不可逆送出後に outcome-verifier が自動発火する"
      - "(3) design-artisan/imagegen のビジュアル成果物が critic PASS 前にユーザーへ出ない"
      - "(4) 単一媒体依頼が専用コマンド（/X運用・/Google広告・/doda 等）に、複数媒体・不明が親パック（/SNS運用 /広告 /媒体管理）に振れる。セットアップの広告媒体質問→ /<媒体名>広告 生成（V30(b)）と registry.yaml の parent 記録まで確認"
      - "(5) ブラウザ操作タスクの登録で create_trigger を選ばずローカル登録を案内する"
      - "(6) 「無人運用前チェックして」でログイン○✗一覧が出る"
      - "(7) design-handoff 発火: ダミーの完成ビジュアルに「これ自分で手直ししたい」で docs/parts/design-handoff.md へ到達（実送付は list_projects 1回まで・プロジェクト作成はドライラン）"
      - "(8) 新2ゲート matcher 発火実測: (a) bulk_send を立てて touch memory/.workflow/k_done → 【OV Gate・試運転(warn)】注入 (b) critic_pending を立ててダミーPNG送付 → 【Critic Gate・試運転(warn)】注入。注入が出なければ matcher 不一致=ゲート不発として FAIL、実際のツール名を記載"
  - action: interact
    description: |
      delve-verify.md の報告書2形式（チャット内サマリー + knowledge/verification/<date>-verify.md）を生成し、
      アーティファクト発行が可能なら URL を添える。検証で作ったフラグ・ダミーデータは後片付けする。

on_error: "FAIL として記録し（エラー原文つき）、次の項目に進む。全項目消化後に報告"
